<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANWAAR</title>
    <link rel="stylesheet" href="https://cloudflare.com">
</head>
<style>
    @import url("https://googleapis.com");

    * {
        margin: 0;
        padding: 0;
        -webkit-box-sizing: border-box;
        box-sizing: border-box;
        scroll-behavior: smooth;
    }

    .home {
        height: 90vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
    }

        .home h1 {
            font-size: 40px;
            margin-bottom: 10px;
        }

        .home p {
            opacity: 0.8;
            margin-bottom: 20px;
        }

    .cta {
        padding: 10px 20px;
        border: none;
        background: white;
        color: black;
        border-radius: 8px;
        cursor: pointer;
        transition: 0.3s;
    }

        .cta:hover {
            background: #ddd;
        }

    body {
        background-image: url("photos/bg.jpeg");
        background-size: auto;
        font-family: "Montserrat", sans-serif;
        opacity: 0;
        transform: scale(0.98);
        transition: opacity 1s cubic-bezier(0.25, 1, 0.5, 1), transform 1s cubic-bezier(0.25, 1, 0.5, 1);
    }

        body.loaded {
            opacity: 1;
            transform: scale(1);
        }

    .navMenu {
        position: absolute;
        top: 8%;
        left: 50%;
        -webkit-transform: translate(-50%, -50%);
        transform: translate(-50%, -50%);
        animation: fadeInDown 0.8s ease forwards;
    }

        .navMenu a {
            color: #000000;
            text-decoration: none;
            font-size: 1.2em;
            text-transform: uppercase;
            font-weight: 500;
            display: inline-block;
            width: 80px;
            -webkit-transition: all 0.2s ease-in-out;
            transition: all 0.2s ease-in-out;
            position: relative;
        }

            .navMenu a:hover {
                color: #6EA385;
            }

        .navMenu .dot {
            width: 6px;
            height: 6px;
            background: #6EA385;
            border-radius: 50%;
            opacity: 0;
            -webkit-transform: translateX(30px);
            transform: translateX(30px);
            -webkit-transition: all 0.2s ease-in-out;
            transition: all 0.2s ease-in-out;
        }

        .navMenu a:nth-child(1):hover ~ .dot {
            -webkit-transform: translateX(30px);
            transform: translateX(30px);
            opacity: 1;
        }

        .navMenu a:nth-child(2):hover ~ .dot {
            -webkit-transform: translateX(110px);
            transform: translateX(110px);
            opacity: 1;
        }

        .navMenu a:nth-child(3):hover ~ .dot {
            -webkit-transform: translateX(200px);
            transform: translateX(200px);
            opacity: 1;
        }

        .navMenu a:nth-child(4):hover ~ .dot {
            -webkit-transform: translateX(285px);
            transform: translateX(285px);
            opacity: 1;
        }

    ul {
        list-style-type: none;
        margin: 0;
        padding: 0;
    }

    li a {
        display: block;
        width: 60px;
        background-color: #dddddd;
    }

    table {
        border-collapse: collapse;
        width: 100%;
        animation: fadeInUp 1s cubic-bezier(0.25, 1, 0.5, 1) 0.3s backwards;
    }

    th, td {
        text-align: left;
        padding: 16px;
        right: 10px;
    }

    /* إضافة تأثير حركة للوجو عند التمرير */
    img {
        transition: transform 0.3s ease;
    }

        img:hover {
            transform: scale(1.03) rotate(-1deg);
        }

    /* تجميل وترتيب زر رقم 86 التفاعلي */
    .button-86 {
        all: unset;
        width: 100px;
        height: 30px;
        font-size: 16px;
        background: transparent;
        border: none;
        position: relative;
        color: #f0f0f0;
        cursor: pointer;
        z-index: 1;
        padding: 10px 20px;
        display: flex;
        align-items: center;
        justify-content: center;
        white-space: nowrap;
        user-select: none;
        -webkit-user-select: none;
        touch-action: manipulation;
        margin-left: 10%;
        transition: transform 0.2s ease;
    }

        .button-86::after,
        .button-86::before {
            content: '';
            position: absolute;
            bottom: 0;
            right: 0;
            z-index: -1;
            transition: all .4s;
        }

        .button-86::before {
            transform: translate(0%, 0%);
            width: 100%;
            height: 100%;
            background: #28282d;
            border-radius: 10px;
        }

        .button-86::after {
            transform: translate(10px, 10px);
            width: 35px;
            height: 35px;
            background: #ffffff15;
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            border-radius: 50px;
        }

        .button-86:hover {
            transform: translateY(-2px);
        }

            .button-86:hover::before {
                transform: translate(0%, 0%);
                width: 100%;
                height: 100%;
                background: #6EA385;
            }

            .button-86:hover::after {
                border-radius: 10px;
                transform: translate(0, 0);
                width: 100%;
                height: 100%;
            }

        .button-86:active {
            transform: translateY(1px);
        }

    .work-container {
        display: flex;
        flex-wrap: wrap;
        gap: 20px;
        justify-content: center;
    }

    /* إضافة تأثير نبض خفيف لبطاقة الإحصائيات */
    .stats-container {
        display: flex;
        gap: 20px;
        background-color: #ffffff;
        padding: 6px;
        border-radius: 12px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        animation: softPulse 3s infinite ease-in-out;
    }

    .stat-item {
        text-align: center;
        min-width: 80px;
        position: relative;
    }

    .number {
        display: block;
        font-size: 19px;
        font-weight: bold;
        color: black;
        margin-bottom: 5px;
    }

    .label {
        color: #888;
        font-size: 13px;
    }

    .marquee-container {
        background-color: #000;
        overflow: hidden;
        white-space: nowrap;
        padding: 15px 0;
        transform: rotate(-2deg);
        width: 110%;
        margin-left: -5%;
        margin-top: 40px;
        display: flex;
        align-items: center;
        box-shadow: 0 8px 20px rgba(0,0,0,0.15);
    }

    .marquee-content {
        display: inline-block;
        animation: scroll 20s linear infinite;
        color: #fff;
        font-family: sans-serif;
        font-size: 20px;
        font-weight: 500;
    }

        .marquee-content span {
            margin: 0 40px;
            text-transform: capitalize;
        }

    .main-container {
        display: flex;
        flex-wrap: wrap;
        gap: 20px;
        justify-content: center;
        padding: 20px;
    }

    .box {
        background-color: #3498db;
        color: white;
        width: calc(50% - 10px);
        height: 180px;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 20px;
        border-radius: 10px;
        box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }

    @media (max-width: 600px) {
        .box {
            width: 100%;
        }
    }

    /* مسارات الأنيميشن المضافة (Keyframes) */
    @keyframes scroll {
        from {
            transform: translateX(0);
        }

        to {
            transform: translateX(-50%);
        }
    }

    @keyframes fadeInUp {
        from {
            opacity: 0;
            transform: translateY(25px);
        }

        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    @keyframes fadeInDown {
        from {
            opacity: 0;
            transform: translate(-50%, -40px);
        }

        to {
            opacity: 1;
            transform: translate(-50%, -50%);
        }
    }

    @keyframes softPulse {
        0%, 100% {
            transform: scale(1);
        }

        50% {
            transform: scale(1.02);
        }
    }
</style>

<body>

    <nav class="navMenu">
        <a href="#home">Home</a>
        <a href="#About">About</a>
        <a href="#Achievements">Honors</a>
        <div class="dot"></div>
    </nav>
    <img src="photos/logo-2-removebg-preview.png" style="width: 15%;">

    <table>
        <tr>
            <th>
                <div style="margin: 4%;">
                    <h5>Hi I am</h5>
                    <h2>Anwaar Abdullah Alsaadi</h2>
                    <br>
                    <h1 style="color: #6EA385; width: 500px;">Software Developer</h1>

                    <div class="stats-container">
                        <div class="stat-item">
                            <span class="number">2+</span>
                            <span class="label">Years Exp.</span>
                        </div>
                    </div>
                    <br>
                    <button class="button-86">Contact</button>
                </div>
            </th>
        </tr>
    </table>

    <!-- سكريبت لتفعيل حركة الظهور عند تحميل الصفحة -->
    <script>
        window.addEventListener('DOMContentLoaded', () => {
        document.body.classList.add('loaded');
        });
    </script>
</body>
</html>
